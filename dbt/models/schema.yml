version: 2

models:
  - name: silver_dgidb_interactions
    description: "Silver layer containing DGIdb drug-gene interactions."
    columns:
      - name: drug_name
        description: "Standardized drug identifier"
        tests:
          - not_null:
              config:
                severity: warn
      - name: gene_symbol
        description: "HUGO/Ensembl gene symbol"
        tests:
          - not_null:
              config:
                severity: warn
      - name: interaction_types
        description: "e.g., 'inhibitor', 'antagonist'"
      - name: source_database
        description: "e.g., 'DrugBank', 'ChEMBL'"
      - name: evidence_score
        description: "Confidence/Assertion score"
